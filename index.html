const map = L.map('map').setView([24.7136, 46.6753], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
}).addTo(map);

const infoWindow = L.popup({ closeButton: false, closeOnClick: false });

for (const z of zonesData) {
    if (!z.coords || z.coords.length < 3) continue;
    const latlngs = z.coords.map(c => [c[0], c[1]]);
    const poly = L.polygon(latlngs, {
        color: z.color,
        fillColor: z.color,
        fillOpacity: 0.55,
        weight: 1.5,
        opacity: 0.9
    }).addTo(map);

    const priceText = z.raw_price > 0 ? `<b>${z.price}</b> SAR/m²` : '暂无数据';
    poly.bindTooltip(`<b>${z.name}</b><br>${priceText}`, {sticky: true});

    poly.on('mouseover', function() { this.setStyle({ fillOpacity: 0.8 }); });
    poly.on('mouseout',  function() { this.setStyle({ fillOpacity: 0.55 }); });
    poly.on('click', function() {
        map.fitBounds(this.getBounds(), {padding: [40, 40]});
    });
}
